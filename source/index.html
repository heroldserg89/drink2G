<!DOCTYPE html>
<html
  class="page"
  lang="ru"
>
<head>
  <meta charset="UTF-8">
  <title>Название проекта</title>
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1"
  >
  <link
    rel="icon"
    href="favicon.ico"
    type="image/x-icon"
  >
  <link
    rel="icon"
    href="favicons/icon.svg"
    type="image/svg+xml"
  >
  <link
    rel="apple-touch-icon"
    href="favicons/apple.png"
  >
  <link
    rel="manifest"
    href="manifest.webmanifest"
  >
  <link
    rel="preload"
    href="fonts/Montserrat-Regular.woff2"
    type="font/woff2"
    as="font"
    crossorigin="anonymous"
  >
  <link
    rel="preload"
    href="fonts/Montserrat-Medium.woff2"
    type="font/woff2"
    as="font"
    crossorigin="anonymous"
  >
  <link
    rel="preload"
    href="fonts/Montserrat-SemiBold.woff2"
    type="font/woff2"
    as="font"
    crossorigin="anonymous"
  >
  <link
    rel="preload"
    href="fonts/Montserrat-Bold.woff2"
    type="font/woff2"
    as="font"
    crossorigin="anonymous"
  >
  <link
    rel="preload"
    href="fonts/Montserrat-ExtraBold.woff2"
    type="font/woff2"
    as="font"
    crossorigin="anonymous"
  >
  <link
    rel="stylesheet"
    href="styles/styles.css"
  >
  <script
    src="scripts/index.js"
    defer
  ></script>
</head>
<body class="page__body">
<header class="header">
  <nav class="header__nav container">
    <a
      href="/"
      class="header__logo logo"
    >
      <picture>
        <source
          media="(min-width: 1440px)"
          srcset="./images/logo-big.svg"
          width="170"
          height="36"
        >
        <source
          media="(min-width: 768px)"
          srcset="./images/logo-medium.svg"
          width="82"
          height="36"
        >
        <img
          class="logo__img"
          src="./images/logo.svg"
          width="32"
          height="36"
          alt="Лого"
        >
      </picture>
    </a>
    <h1
      class="header__title"
      aria-label="Интернет-магазин кофейных напитков"
    >
      Интернет-магазин кофейных напитков
    </h1>
    <div class="header__nav-block">
      <ul class="header__nav-site nav-site">
        <li class="nav-site__item">
          <a
            class="nav-site__link nav-site__link--active"
            href="#"
          >
            Главная
          </a>
        </li>
        <li class="nav-site__item">
          <a
            class="nav-site__link"
            href="#"
          >
            Каталог
          </a>
        </li>
        <li class="nav-site__item">
          <a
            class="nav-site__link"
            href="#"
          >
            Доставка
          </a>
        </li>
        <li class="nav-site__item">
          <a
            class="nav-site__link"
            href="#"
          >
            О нас
          </a>
        </li>
      </ul>
    </div>
    <ul class="header__nav-user nav-user">
      <li class="nav-user__item">
        <a
          class="nav-user__link nav-user__link--user"
          href="#"
          aria-label="Войти"
        >
          <span class="nav-user__text">Войти</span>
        </a>
      </li>
      <li class="nav-user__item">
        <a
          class="nav-user__link nav-user__link--cart"
          href="#"
          aria-label="Корзина"
        >
          <span class="nav-user__text">Корзина</span>
        </a>
      </li>
      <li class="nav-user__item nav-user__item--hidden-md">
        <button
          class="nav-user__button burger"
          type="button"
        >
          <span class="burger__line"></span>
          <span class="visually-hidden">Открыть меню</span>
        </button>
      </li>
    </ul>

  </nav>
</header>
<main>
  <h1>Страница для старта</h1>
</main>
</body>
</html>
